<svg width="96" height="32" viewBox="0 0 96 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .dot {
      animation: bounce 1.2s infinite ease-in-out;
      transform-origin: center;
    }

    .dot2 {
      animation-delay: .2s;
    }

    .dot3 {
      animation-delay: .4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0) scale(.7);
        opacity: .5;
      }

      40% {
        transform: translateY(-10px) scale(1);
        opacity: 1;
      }
    }
  </style>

  <defs>
    <linearGradient id="logoGradient" x1="18" y1="28" x2="78" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A3CFF"/>
      <stop offset="1" stop-color="#4F7CFF"/>
    </linearGradient>
</defs>

  <circle class="dot dot1" cx="20" cy="20" r="8" fill="url(#logoGradient)"/>
  <circle class="dot dot2" cx="48" cy="20" r="8" fill="url(#logoGradient)"/>
  <circle class="dot dot3" cx="76" cy="20" r="8" fill="url(#logoGradient)"/>
</svg>
