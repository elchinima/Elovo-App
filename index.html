<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elovo Chat</title>
    <link rel="icon" type="image/png" href="./Assets/Images/Logo/Elovo-Logo.png">
    <link rel="stylesheet" href="./Assets/CSS/responisve.css">
    <link rel="stylesheet" href="./Assets/CSS/style.css">
</head>
<body>
    <main class="app-shell">
        <section class="messenger-view is-active" id="messengerView" aria-label="Messenger simulation">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="brand-mark">
                        <img src="Assets/Images/Logo/Elovo-Logo.png" alt="">
                    </div>
                    <div>
                        <p>Elovo</p>
                        <strong>Messages</strong>
                    </div>
                </div>

                <label class="search-box">
                    <span>Search</span>
                    <input type="search" id="searchInput" placeholder="Search chats">
                </label>

                <div class="chat-list" id="chatList" aria-label="Conversation list"></div>
            </aside>

            <section class="chat-panel">
                <header class="chat-header">
                    <button class="icon-button mobile-back" id="backButton" type="button" aria-label="Back to conversations" title="Back">
                        <img class="button-icon" src="Assets/Images/Icons/back.svg" alt="">
                    </button>
                    <div class="avatar" id="activeAvatar">M</div>
                    <div>
                        <h2 id="activeName">Maya Sterling</h2>
                        <p id="activeStatus">Online now</p>
                    </div>
                    <button class="ghost-button" id="logoutButton" type="button" aria-label="Log out" title="Log out">
                        <img class="button-icon" src="Assets/Images/Icons/logout.svg" alt="">
                    </button>
                </header>

                <div class="message-stream" id="messageStream" aria-live="polite"></div>

                <form class="composer" id="messageForm">
                    <button type="button" class="icon-button" aria-label="Attach file" title="Attach file">
                        <img class="button-icon" src="Assets/Images/Icons/attach.svg" alt="">
                    </button>
                    <input type="text" id="messageInput" placeholder="Write a message" autocomplete="off">
                    <button class="send-button" type="submit" aria-label="Send message" title="Send message">
                        <img class="button-icon" src="Assets/Images/Icons/send.svg" alt="">
                    </button>
                </form>
            </section>
        </section>
    </main>

    <script src="Assets/Script/app.js"></script>
</body>
</html>
