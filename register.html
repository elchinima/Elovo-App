<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elovo Register</title>
    <link rel="icon" type="image/png" href="./Assets/Images/Logo/Elovo-Logo.png">
    <link rel="stylesheet" href="./Assets/CSS/style.css">
    <link rel="stylesheet" href="./Assets/CSS/responisve.css">
</head>
<body>
    <main class="app-shell">
        <section class="login-view is-active" aria-label="Register">
            <div class="brand-panel">
                <img class="brand-logo" src="Assets/Images/Logo/Elovo-Logo.png" alt="Elovo logo">
                <p class="eyebrow">Elovo Chat</p>
                <h1>Get started with your secure workspace.</h1>
                <p class="support-copy">A polished messenger simulation built around fast conversations, shared files, and calm focus.</p>
            </div>

            <form class="login-card" id="registerForm">
                <div>
                    <span class="form-kicker">Welcome</span>
                    <h2>Create Account</h2>
                </div>
                <label>
                    Username
                    <input type="text" id="regUsername" required>
                </label>
                <label>
                    Password
                    <input type="password" id="regPassword" required>
                </label>
                <button class="primary-icon-button" type="submit" aria-label="Create Account" title="Create Account">
                    <img class="button-icon" src="Assets/Images/Icons/signup.svg" alt="">
                    <span>Sign up</span>
                </button>
                <a href="login.html" class="secondary-button">Already have an account? Log in</a>
                <p class="error-message" id="regError" style="color: red; display: none; margin-top: 10px; font-size: 0.875rem;">Username already exists.</p>
            </form>
        </section>
    </main>

    <script src="Assets/Script/app.js"></script>
</body>
</html>
